name: montra_expense_tracker
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  font_awesome_flutter: 10.8.0
  flutter_secure_storage: 9.2.4
  pinput: 5.0.1
  numeric_keyboard: 1.1.0
  provider: ^6.1.4
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

